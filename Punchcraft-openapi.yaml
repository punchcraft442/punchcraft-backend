        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadDocumentReferenceRequest'
      responses:
        '201':
          description: Certification uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentReferenceResponse'

  /profiles/officials:
