  /profiles/coaches/{id}/submit:
    post:
      tags: [Coaches]
      summary: Submit coach profile for review
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Profile submitted for review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoachProfileResponse'

  /profiles/coaches/{id}/certifications:
