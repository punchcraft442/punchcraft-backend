  /directories:
    get:
      tags: [Directories]
      summary: Search public directory across roles
      security: []
      parameters:
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/RoleType'
        - $ref: '#/components/parameters/KeywordParam'
        - $ref: '#/components/parameters/RegionParam'
        - $ref: '#/components/parameters/CityParam'
        - $ref: '#/components/parameters/VerificationTierParam'
        - $ref: '#/components/parameters/WeightClassParam'
        - $ref: '#/components/parameters/SortParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
