openapi: 3.0.3
info:
  title: PunchCraft API
  version: 1.0.0
  description: |
    REST API for PunchCraft, a boxing ecosystem platform for profiling, verifying,
    and connecting fighters, gyms, coaches, referees/judges, promoters,
    matchmakers, and fans.

    This specification is based on the PunchCraft project brief and scope.
servers:
  - url: https://api.punchcraft.com/api/v1
    description: Production
  - url: https://staging-api.punchcraft.com/api/v1
    description: Staging

tags:
  - name: Auth
  - name: Users
  - name: Fighters
  - name: Gyms
  - name: Coaches
  - name: Officials
  - name: Promoters
  - name: Matchmakers
  - name: Fans
  - name: Directories
  - name: Contact Requests
  - name: Favorites
  - name: Reports
  - name: Notifications
  - name: Uploads
  - name: Metadata
  - name: Admin

security:
  - bearerAuth: []

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Account created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthRegisterResponse'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/verify-email:
    get:
      tags: [Auth]
      summary: Activate account via email link
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Account activated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericMessageResponse'
        '400':
          $ref: '#/components/responses/BadRequestError'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshTokenResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and invalidate refresh token
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericMessageResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Password reset email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericMessageResponse'

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericMessageResponse'

  /auth/change-password:
    patch:
      tags: [Auth]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericMessageResponse'

  /users/me:
    get:
      tags: [Users]
      summary: Get current user
      responses:
        '200':
          description: Current user details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
    patch:
      tags: [Users]
      summary: Update current user settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'

  /profiles/fighters:
    post:
      tags: [Fighters]
      summary: Create fighter profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFighterProfileRequest'
      responses:
        '201':
          description: Fighter profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FighterProfileResponse'
    get:
      tags: [Fighters]
      summary: List fighter profiles
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/KeywordParam'
        - $ref: '#/components/parameters/RegionParam'
        - $ref: '#/components/parameters/CityParam'
        - $ref: '#/components/parameters/VerificationTierParam'
        - $ref: '#/components/parameters/WeightClassParam'
        - $ref: '#/components/parameters/SortParam'
      security: []
      responses:
        '200':
          description: Paginated fighter profiles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FighterProfileListResponse'

  /profiles/fighters/{id}:
    get:
      tags: [Fighters]
      summary: Get fighter profile by ID
      security: []
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Fighter profile details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FighterProfileResponse'
        '404':
          $ref: '#/components/responses/NotFoundError'
    patch:
      tags: [Fighters]
      summary: Update fighter profile
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFighterProfileRequest'
      responses:
        '200':
          description: Fighter profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FighterProfileResponse'

  /profiles/fighters/{id}/submit:
    post:
      tags: [Fighters]
      summary: Submit fighter profile for review
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Profile submitted for review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FighterProfileResponse'

  /profiles/fighters/{id}/fight-history:
    post:
      tags: [Fighters]
      summary: Add fight history entry
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFightHistoryRequest'
      responses:
        '201':
          description: Updated fighter profile including new fight history entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FighterProfileResponse'

  /profiles/fighters/{id}/fight-history/{fightId}:
    delete:
      tags: [Fighters]
      summary: Delete a fight history entry
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
        - name: fightId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Fight history entry deleted
        '404':
          $ref: '#/components/responses/NotFoundError'

  /profiles/gyms:
    post:
      tags: [Gyms]
      summary: Create gym profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGymProfileRequest'
      responses:
        '201':
          description: Gym profile created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GymProfileResponse'
    get:
      tags: [Gyms]
      summary: List gym profiles
      security: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/KeywordParam'
        - $ref: '#/components/parameters/RegionParam'
        - $ref: '#/components/parameters/CityParam'
        - $ref: '#/components/parameters/VerificationTierParam'
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          description: Paginated gym profiles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GymProfileListResponse'

  /profiles/gyms/{id}:
    get:
      tags: [Gyms]
      summary: Get gym profile by ID
      security: []
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Gym profile details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GymProfileResponse'
    patch:
      tags: [Gyms]
      summary: Update gym profile
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGymProfileRequest'
      responses:
        '200':
          description: Gym profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GymProfileResponse'

  /profiles/gyms/{id}/submit:
    post:
      tags: [Gyms]
      summary: Submit gym profile for review
      parameters:
        - $ref: '#/components/parameters/IdPathParam'
      responses:
        '200':
          description: Profile submitted for review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GymProfileResponse'

  /profiles/gyms/{gymId}/coaches/{coachId}:
    post:
      tags: [Gyms]
      summary: Link coach to gym
      parameters:
        - name: gymId
          in: path
          required: true
          schema:
            type: string
        - name: coachId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Coach linked to gym
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericMessageResponse'
    delete:
      tags: [Gyms]
      summary: Unlink coach from gym
      parameters:
        - name: gymId
          in: path
          required: true
          schema:
            type: string
        - name: coachId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Coach unlinked from gym
        '404':
          $ref: '#/components/responses/NotFoundError'

  /profiles/gyms/{gymId}/fighters/{fighterId}:
    post:
      tags: [Gyms]
      summary: Add fighter to gym roster
      parameters:
        - name: gymId
          in: path
          required: true
          schema:
            type: string
        - name: fighterId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Fighter association initiated or completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericMessageResponse'
    delete:
      tags: [Gyms]
      summary: Unlink fighter from gym roster
      parameters:
        - name: gymId
          in: path
          required: true
          schema:
            type: string
        - name: fighterId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Fighter unlinked from gym
        '404':
          $ref: '#/components/responses/NotFoundError'

  /profiles/coaches:
    post:
      tags: [Coaches]
      summary: Create coach profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCoachProfileRequest'
