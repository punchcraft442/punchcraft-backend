components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    IdPathParam:
      name: id
      in: path
      required: true
      schema:
        type: string
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    KeywordParam:
      name: keyword
      in: query
      schema:
        type: string
    RegionParam:
      name: region
      in: query
      schema:
        type: string
    CityParam:
      name: city
      in: query
      schema:
        type: string
    VerificationTierParam:
      name: verificationTier
      in: query
      schema:
        $ref: '#/components/schemas/VerificationTier'
    WeightClassParam:
      name: weightClass
      in: query
      schema:
        type: string
    SortParam:
      name: sort
      in: query
      schema:
        type: string
        enum: [verified_first, newest, oldest, name_asc, name_desc]

  responses:
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnauthorizedError:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    SuccessFlag:
      type: object
      properties:
        success:
          type: boolean
          example: true

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: Validation failed
        errors:
          type: array
          items:
            $ref: '#/components/schemas/FieldError'

    FieldError:
      type: object
      properties:
        field:
          type: string
        message:
          type: string

    GenericMessageResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Operation completed successfully

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 20
        totalItems:
          type: integer
          example: 120
        totalPages:
          type: integer
          example: 6

    RoleType:
      type: string
      enum:
        - super_admin
        - admin
        - fighter
        - gym
        - coach
        - referee_judge
        - promoter
        - matchmaker
        - fan

    AccountStatus:
      type: string
      enum: [inactive, active, suspended, disabled, deleted]

    ProfileStatus:
      type: string
      enum: [draft, submitted, approved, rejected]

    Visibility:
      type: string
      enum: [private, public]

    VerificationTier:
      type: string
      enum: [unverified, tier_2_verified, tier_1_managed_verified]

    SocialLinks:
      type: object
      properties:
        instagram:
          type: string
          format: uri
        tiktok:
          type: string
          format: uri
        youtube:
          type: string
          format: uri
        facebook:
          type: string
          format: uri
        x:
          type: string
          format: uri
        website:
          type: string
          format: uri

    Location:
      type: object
      properties:
        country:
          type: string
          example: Ghana
        region:
          type: string
          example: Greater Accra
        city:
          type: string
          example: Accra

    ContactDetails:
      type: object
      properties:
        email:
          type: string
          format: email
        phone:
          type: string
        showEmailPublicly:
          type: boolean
          default: false
        showPhonePublicly:
          type: boolean
          default: false

    MediaItem:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [image, video, external_link]
        url:
          type: string
          format: uri
        title:
          type: string

    BaseProfile:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        role:
          $ref: '#/components/schemas/RoleType'
        status:
          $ref: '#/components/schemas/ProfileStatus'
        visibility:
          $ref: '#/components/schemas/Visibility'
        verificationTier:
          $ref: '#/components/schemas/VerificationTier'
        profileImage:
          type: string
          format: uri
        coverImage:
          type: string
          format: uri
        bio:
          type: string
        location:
          $ref: '#/components/schemas/Location'
        contactDetails:
          $ref: '#/components/schemas/ContactDetails'
        socialLinks:
          $ref: '#/components/schemas/SocialLinks'
        mediaGallery:
          type: array
          items:
            $ref: '#/components/schemas/MediaItem'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ProfileSummary:
      type: object
      description: Lightweight profile representation returned by list endpoints
      properties:
        id:
          type: string
        userId:
          type: string
        role:
          $ref: '#/components/schemas/RoleType'
        displayName:
          type: string
        status:
          $ref: '#/components/schemas/ProfileStatus'
        visibility:
          $ref: '#/components/schemas/Visibility'
        verificationTier:
          $ref: '#/components/schemas/VerificationTier'
        searchable:
          type: boolean
        profileImage:
          type: string
          format: uri
        location:
          $ref: '#/components/schemas/Location'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [fullName, email, password, role]
      properties:
        fullName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        role:
          $ref: '#/components/schemas/RoleType'

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string
          format: password

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password

    AuthRegisterResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Account created successfully
        data:
          type: object
          properties:
            userId:
              type: string
            email:
              type: string
              format: email
            role:
              $ref: '#/components/schemas/RoleType'
            accountStatus:
              $ref: '#/components/schemas/AccountStatus'

    LoginResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: object
          properties:
            accessToken:
              type: string
            refreshToken:
              type: string
            user:
              $ref: '#/components/schemas/UserSummary'

    RefreshTokenResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            accessToken:
              type: string

    UserSummary:
      type: object
      properties:
        id:
          type: string
        fullName:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/RoleType'
        accountStatus:
          $ref: '#/components/schemas/AccountStatus'

    CurrentUserResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/UserSummary'

    UpdateUserRequest:
      type: object
      properties:
        phone:
          type: string
        profilePhoto:
          type: string
          format: uri
        socialLinks:
          $ref: '#/components/schemas/SocialLinks'

    FighterRecord:
      type: object
      properties:
        wins:
          type: integer
          minimum: 0
        losses:
          type: integer
          minimum: 0
        draws:
          type: integer
          minimum: 0
        kos:
          type: integer
          minimum: 0

    FighterProfile:
      allOf:
        - $ref: '#/components/schemas/BaseProfile'
