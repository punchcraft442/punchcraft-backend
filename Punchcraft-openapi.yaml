          properties:
            fullName:
              type: string
            ringName:
              type: string
            nationality:
              type: string
            weightClass:
              type: string
            stance:
              type: string
              enum: [orthodox, southpaw, switch, unknown]
            heightCm:
              type: integer
            reachCm:
              type: integer
            record:
              $ref: '#/components/schemas/FighterRecord'
            titles:
              type: array
              items:
                type: string
            linkedGymId:
              type: string
            linkedCoachId:
              type: string

    CreateFighterProfileRequest:
      type: object
